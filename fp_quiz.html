<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP 시험 퀴즈</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FP 합격기원">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#f0e6ff 0%,#fce4ec 50%,#e8f5e9 100%);min-height:100vh;color:#4a4a4a;line-height:1.6}
.container{max-width:680px;margin:0 auto;padding:20px}
h1{font-size:1.8rem;font-weight:700;text-align:center;color:#7c4dff;margin-bottom:8px}
.subtitle{text-align:center;color:#b388ff;font-size:.95rem;margin-bottom:30px;font-weight:300}
.card{background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-radius:20px;padding:28px;margin-bottom:20px;box-shadow:0 4px 20px rgba(186,147,255,.15)}
.tab-bar{display:flex;gap:0;margin-bottom:20px;background:rgba(255,255,255,.7);border-radius:16px;padding:4px;box-shadow:0 2px 10px rgba(186,147,255,.1)}
.tab-btn{flex:1;padding:12px;border:none;border-radius:12px;background:0 0;color:#9575cd;font-size:.88rem;font-weight:500;cursor:pointer;transition:.3s;font-family:inherit}
.tab-btn.active{background:linear-gradient(135deg,#b388ff,#ea80fc);color:#fff;box-shadow:0 3px 12px rgba(179,136,255,.3)}
.tab-btn .badge{display:inline-block;background:#ff8a80;color:#fff;border-radius:10px;padding:1px 7px;font-size:.7rem;margin-left:4px;font-weight:700}
.tab-btn.active .badge{background:rgba(255,255,255,.4)}
.category-section{margin-bottom:24px}
.category-title{font-size:.85rem;font-weight:600;color:#9575cd;margin-bottom:12px;letter-spacing:.5px}
.category-grid{display:flex;flex-wrap:wrap;gap:8px}
.cat-btn{padding:8px 16px;border:2px solid #e1bee7;border-radius:30px;background:#fff;color:#7c4dff;font-size:.82rem;cursor:pointer;transition:.25s;font-family:inherit}
.cat-btn:hover{background:#f3e5f5;border-color:#ce93d8;transform:translateY(-1px)}
.cat-btn.active{background:linear-gradient(135deg,#b388ff,#ea80fc);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(179,136,255,.3)}
.start-btn{display:block;width:100%;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#b388ff,#f48fb1);color:#fff;font-size:1.05rem;font-weight:600;cursor:pointer;transition:.3s;font-family:inherit;margin-top:20px;letter-spacing:1px}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(179,136,255,.4)}
.start-btn:active{transform:translateY(0)}
.start-btn.secondary{background:linear-gradient(135deg,#e1bee7,#b388ff)}
.start-btn.danger{background:linear-gradient(135deg,#ef9a9a,#f48fb1);font-size:.85rem;padding:12px;margin-top:12px}
.progress-bar-wrap{background:#f3e5f5;border-radius:20px;height:8px;margin-bottom:20px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#b388ff,#f48fb1);border-radius:20px;transition:width .4s}
.progress-text{text-align:center;font-size:.8rem;color:#b388ff;margin-bottom:10px;font-weight:500}
.q-number{display:inline-block;background:linear-gradient(135deg,#b388ff,#ea80fc);color:#fff;width:32px;height:32px;border-radius:50%;text-align:center;line-height:32px;font-size:.85rem;font-weight:700;margin-bottom:12px}
.q-text{font-size:1rem;font-weight:500;color:#424242;margin-bottom:20px;line-height:1.7}
.option-btn{display:block;width:100%;padding:14px 18px;margin-bottom:10px;border:2px solid #e8e0f0;border-radius:14px;background:#fff;text-align:left;font-size:.9rem;cursor:pointer;transition:.25s;font-family:inherit;color:#555;line-height:1.5}
.option-btn:hover:not(.disabled){background:#faf5ff;border-color:#d1c4e9;transform:translateX(4px)}
.option-btn.correct{border-color:#81c784;background:#e8f5e9;color:#2e7d32}
.option-btn.correct::before{content:'✓ ';font-weight:700}
.option-btn.wrong{border-color:#ef9a9a;background:#fce4ec;color:#c62828}
.option-btn.wrong::before{content:'✗ ';font-weight:700}
.option-btn.show-answer{border-color:#81c784;background:#e8f5e9;color:#2e7d32}
.option-btn.disabled{cursor:default;opacity:.85}
.option-num{display:inline-block;width:24px;height:24px;border-radius:50%;background:#f3e5f5;text-align:center;line-height:24px;font-size:.75rem;font-weight:600;color:#9575cd;margin-right:10px}
.new-badge{display:inline-block;background:linear-gradient(135deg,#ff8a80,#ff5252);color:#fff;border-radius:8px;padding:1px 7px;font-size:.65rem;font-weight:700;margin-left:6px;vertical-align:middle;letter-spacing:.5px}
.next-btn{display:none;width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#b388ff,#f48fb1);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;transition:.3s;font-family:inherit;margin-top:16px}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(179,136,255,.35)}
.prompt-box{margin-top:16px;background:linear-gradient(135deg,#fff3e0,#fce4ec);border:1px solid #ffccbc;border-radius:14px;padding:16px;display:none}
.prompt-box-title{font-size:.8rem;font-weight:600;color:#e57373;margin-bottom:8px}
.prompt-text{font-size:.78rem;color:#666;white-space:pre-wrap;max-height:200px;overflow-y:auto;line-height:1.6;background:#fff;padding:12px;border-radius:10px;border:1px solid #f5f5f5}
.copy-btn{display:inline-block;padding:8px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#ffab91,#f48fb1);color:#fff;font-size:.8rem;font-weight:600;cursor:pointer;margin-top:10px;transition:.25s;font-family:inherit}
.copy-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(244,143,177,.3)}
.result-circle{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,#b388ff,#f48fb1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 30px rgba(179,136,255,.3)}
.result-score{color:#fff;font-size:2.2rem;font-weight:700}
.result-msg{text-align:center;font-size:1.1rem;font-weight:500;color:#7c4dff;margin-bottom:24px}
.wrong-list{margin-top:16px}
.wrong-item{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border-left:4px solid #ef9a9a}
.wrong-item .q-label{font-size:.82rem;font-weight:600;color:#e57373;margin-bottom:6px}
.wrong-item .q-body{font-size:.88rem;color:#555;margin-bottom:8px}
.wrong-item .answer-info{font-size:.8rem;color:#999;margin-bottom:8px}
.wrong-item .answer-info strong{color:#2e7d32}
.wrong-item .wrong-count{font-size:.72rem;color:#b388ff;margin-bottom:6px}
.hidden{display:none!important}
.emoji{font-size:2rem;text-align:center;margin-bottom:10px}
.count-info{text-align:center;font-size:.82rem;color:#b388ff;margin-bottom:16px}
.note-empty{text-align:center;padding:40px 20px;color:#ce93d8}
.note-empty .big-emoji{font-size:3rem;margin-bottom:12px}
.note-stats{display:flex;gap:12px;margin-bottom:20px}
.stat-card{flex:1;background:#fff;border-radius:14px;padding:14px;text-align:center}
.stat-num{font-size:1.4rem;font-weight:700;color:#7c4dff}
.stat-label{font-size:.72rem;color:#b388ff;margin-top:2px}
.note-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.note-filter-btn{padding:5px 12px;border:1.5px solid #e1bee7;border-radius:20px;background:#fff;color:#9575cd;font-size:.75rem;cursor:pointer;transition:.2s;font-family:inherit}
.note-filter-btn.active{background:#e1bee7;color:#6a1b9a}
.del-btn{background:0 0;border:1px solid #ef9a9a;color:#ef9a9a;padding:4px 10px;border-radius:8px;font-size:.7rem;cursor:pointer;font-family:inherit;margin-left:8px;transition:.2s}
.del-btn:hover{background:#fce4ec}
@media(max-width:600px){.container{padding:14px}.card{padding:20px;border-radius:16px}h1{font-size:1.5rem}.q-text{font-size:.93rem}.option-btn{padding:12px 14px;font-size:.85rem}.tab-btn{font-size:.8rem;padding:10px 6px}}
/* 화면보호기 */
/* 💌 편지 버튼 */
.letter-wrap{position:fixed;bottom:20px;right:76px;z-index:9998}
.letter-btn{width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,#f48fb1,#ff80ab);color:#fff;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 15px rgba(244,143,177,.4);transition:.3s;display:flex;align-items:center;justify-content:center;position:relative}
.letter-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(244,143,177,.5)}
.letter-btn:active{transform:scale(.95)}
.letter-badge{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;background:#ff1744;color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(255,23,68,.4);animation:badgePulse 2s infinite}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.letter-bubble{display:none;position:fixed;bottom:78px;right:20px;width:300px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-radius:20px;padding:24px;box-shadow:0 8px 30px rgba(244,143,177,.25);z-index:9999;animation:bubbleIn .3s ease}
.letter-bubble::after{content:'';position:absolute;bottom:-10px;right:40px;width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:12px solid rgba(255,255,255,.95)}
@keyframes bubbleIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.letter-bubble .letter-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:1rem;color:#ccc;cursor:pointer}
.letter-bubble .letter-greeting{font-size:1.05rem;font-weight:700;color:#f48fb1;margin-bottom:10px}
.letter-bubble .letter-body{font-size:.88rem;color:#555;line-height:1.7}
.letter-bubble .letter-from{text-align:right;font-size:.78rem;color:#b388ff;margin-top:12px;font-weight:500}
.ss-wrap{position:fixed;bottom:20px;right:20px;z-index:9998;display:flex;flex-direction:column;align-items:center;gap:0}
.ss-btn{width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,#b388ff,#ea80fc);color:#fff;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 15px rgba(179,136,255,.4);transition:.3s;display:flex;align-items:center;justify-content:center}
.ss-btn:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(179,136,255,.5)}
.ss-btn:active{transform:scale(.95)}
.ss-setting-pip{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.9);color:#9575cd;font-size:.85rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:6px;opacity:0;transform:translateY(10px) scale(.8);transition:all .25s ease;pointer-events:none}
.ss-wrap:hover .ss-setting-pip{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.ss-setting-pip:hover{background:#f3e5f5;transform:scale(1.1)!important}
.ss-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;display:none;background:#000;cursor:pointer}
.ss-overlay img{width:100%;height:100%;object-fit:contain}
.ss-overlay.cover img{object-fit:cover}
.ss-setup{position:fixed;bottom:80px;right:20px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-radius:16px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.15);z-index:9998;display:none;width:280px}
.ss-setup-title{font-size:.85rem;font-weight:600;color:#7c4dff;margin-bottom:12px}
.ss-upload-area{border:2px dashed #d1c4e9;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:10px}
.ss-upload-area:hover{border-color:#b388ff;background:#faf5ff}
.ss-upload-area p{font-size:.78rem;color:#9575cd;margin-top:6px}
.ss-preview{width:100%;border-radius:10px;margin-bottom:10px;max-height:120px;object-fit:cover}
.ss-opt{display:flex;gap:8px;margin-bottom:10px}
.ss-opt button{flex:1;padding:8px;border:1.5px solid #e1bee7;border-radius:10px;background:#fff;color:#9575cd;font-size:.75rem;cursor:pointer;font-family:inherit;transition:.2s}
.ss-opt button.active{background:#e1bee7;color:#6a1b9a;border-color:#ce93d8}
.ss-opt button:hover{background:#f3e5f5}
.ss-close-setup{padding:8px;border:none;border-radius:10px;background:linear-gradient(135deg,#b388ff,#f48fb1);color:#fff;font-size:.8rem;font-weight:500;cursor:pointer;width:100%;font-family:inherit;transition:.2s}
.ss-close-setup:hover{transform:translateY(-1px)}
.ss-remove{padding:6px;border:1px solid #ef9a9a;border-radius:8px;background:#fff;color:#ef9a9a;font-size:.72rem;cursor:pointer;width:100%;font-family:inherit;margin-top:6px;transition:.2s}
.ss-remove:hover{background:#fce4ec}
</style>
</head>
<body>
<div class="container">
<div class="tab-bar">
<button class="tab-btn active" onclick="switchTab('quiz')">📝 퀴즈</button>
<button class="tab-btn" onclick="switchTab('notebook')">📕 오답노트 <span class="badge" id="noteBadge">0</span></button>
</div>
<div id="quizTab">
<div id="startScreen">
<div class="card" style="text-align:center;padding:36px 28px">
<div class="emoji">📚✨</div>
<h1>FP 시험 퀴즈</h1>
<p class="subtitle">재무설계사 자격시험 대비 연습</p>
</div>
<div class="card">
<div class="category-section">
<div class="category-title">📋 출제 범위 선택</div>
<div class="category-grid" id="catGrid"></div>
</div>
<div class="category-section" style="margin-top:16px">
<div class="category-title">📊 난이도</div>
<div class="category-grid" id="diffGrid"></div>
</div>
<div class="count-info" id="countInfo"></div>
<button class="start-btn" onclick="startQuiz('normal')">테스트 시작하기 →</button>
</div>
</div>
<div id="quizScreen" class="hidden">
<div class="card">
<div class="progress-text" id="progressText"></div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
<div class="q-number" id="qNum"></div>
<div class="q-text" id="qText"></div>
<div id="optionsWrap"></div>
<div class="prompt-box" id="promptBox">
<div class="prompt-box-title">💬 ChatGPT에 복붙하세요!</div>
<div class="prompt-text" id="promptText"></div>
<button class="copy-btn" onclick="copyPrompt()">📋 프롬프트 복사하기</button>
</div>
<button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
</div>
</div>
<div id="resultScreen" class="hidden">
<div class="card" style="text-align:center">
<div class="emoji" id="resultEmoji"></div>
<div class="result-circle"><div class="result-score" id="resultScore"></div></div>
<div class="result-msg" id="resultMsg"></div>
<button class="start-btn" onclick="startQuiz('normal')" style="margin-bottom:10px">🔄 새 문제 세트</button>
<button class="start-btn secondary" onclick="goHome()">🏠 처음으로</button>
</div>
<div id="wrongList" class="card wrong-list"></div>
</div>
</div>
<div id="notebookTab" class="hidden">
<div class="card">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
<div style="font-size:1.1rem;font-weight:700;color:#7c4dff">📕 오답노트</div>
<div style="font-size:.75rem;color:#b388ff" id="noteCountText"></div>
</div>
<div class="note-stats" id="noteStats"></div>
<div id="noteFilterWrap" class="note-filter"></div>
<div id="noteContent"></div>
<div id="noteActions" class="hidden" style="margin-top:16px">
<button class="start-btn" onclick="startQuiz('wrong')" id="wrongQuizBtn">❌ 틀린 문제만 다시 풀기</button>
<button class="start-btn danger" onclick="clearNotebook()">🗑️ 오답노트 초기화</button>
</div>
</div>
</div>
</div>

<!-- 💌 편지 -->
<div class="letter-wrap">
<button class="letter-btn" id="letterBtn" onclick="toggleLetter()">💌<span class="letter-badge" id="letterBadge">1</span></button>
</div>
<div class="letter-bubble" id="letterBubble">
<button class="letter-close" onclick="closeLetter()">✕</button>
<div class="letter-greeting" id="letterGreeting"></div>
<div class="letter-body" id="letterBody"></div>
<div class="letter-from" id="letterFrom"></div>
</div>

<!-- 화면보호기 -->
<div class="ss-wrap" id="ssWrap">
<button class="ss-setting-pip" id="ssSettingPip" onclick="openSSSetup()">⚙️</button>
<button class="ss-btn" id="ssBtn" onclick="toggleSS()">🔒</button>
</div>
<div class="ss-overlay" id="ssOverlay" onclick="hideSS()"><img id="ssImg" src="" alt=""></div>
<div class="ss-setup" id="ssSetup">
<div class="ss-setup-title">🖼️ 화면보호기 설정</div>
<div id="ssPreviewWrap"></div>
<div class="ss-upload-area" id="ssUploadArea" onclick="document.getElementById('ssFileInput').click()">
<div style="font-size:1.5rem">📷</div>
<p>이미지를 선택하세요</p>
<p style="font-size:.7rem;color:#ce93d8">(캡쳐 화면, 다른 앱 화면 등)</p>
</div>
<input type="file" id="ssFileInput" accept="image/*" style="display:none" onchange="handleSSUpload(event)">
<div class="ss-opt" id="ssOptWrap">
<button onclick="setSSFit('contain')" id="ssFitContain" class="active">맞춤</button>
<button onclick="setSSFit('cover')" id="ssFitCover">채우기</button>
</div>
<button class="ss-close-setup" onclick="closeSSSetup()">✓ 설정 완료</button>
<button class="ss-close-setup" style="margin-top:6px;background:linear-gradient(135deg,#e0e0e0,#bdbdbd)" onclick="closeSSSetup()">건너뛰기 (이미지 없이 검정화면)</button>
<button class="ss-remove" id="ssRemoveBtn" onclick="removeSSImage()" style="display:none">🗑️ 이미지 삭제</button>
<p style="font-size:.68rem;color:#b388ff;margin-top:10px;text-align:center">🔒 클릭: 화면보호기 전환<br>⚙️: 마우스 갖다대면 위에 나타남<br><b>Ctrl+Shift+Z</b>: 전환 단축키<br>해제: 화면 아무 곳이나 클릭</p>
</div>

<script>
const Q=[
// ═══════════════════════════════════════
// 1부 - 재산관리 기본지식
// ═══════════════════════════════════════
{c:"1부-재산관리",q:"개인 재무설계의 사회·경제적 배경이 아닌 것은?",o:["자산 및 부채의 증가","금융시장 개방 및 국제화","금융생활 다양화","1인 가구의 증가","금융관련 법규 강화"],a:3,s:"사회·경제적 배경: 자산·부채 증가, 금융시장 개방, 금융생활 다양화, 법규 강화. 인구통계적: 1인가구 증가, 저출산·고령화"},
{c:"1부-재산관리",q:"인구통계적 배경에 해당하는 것은?",o:["금융시장 국제화","자산 증가","저출산 및 고령화","개인주의적 사고","금융법규 강화"],a:2,s:"인구통계적 배경: 1인가구 증가, 저출산 및 고령화, 노동환경 변화"},
{c:"1부-재산관리",q:"소비자 의식 변화에 해당하지 않는 것은?",o:["개인주의적 사고","비재무적 목표 증가","재무설계 중요성 인식","금융시장 개방","가족 건강·삶의 질 추구"],a:3,s:"소비자 의식 변화: 개인주의, 비재무적 목표 증가, 재무설계 중요성 인식"},
{c:"1부-재산관리",q:"노령화지수에서 생산가능인구의 연령 범위는?",o:["18~60세","15~64세","20~65세","15~59세","18~65세"],a:1,s:"생산가능인구: 15~64세, 노령인구: 65세 이상"},

{c:"1부-세무설계",q:"순금융재산가액 5억원일 때 금융재산 상속공제액은?",o:["5천만원","1억원","1.5억원","2억원","2.5억원"],a:1,s:"5억×20%=1억원. 한도 2억원 이내이므로 공제액은 1억원"},
{c:"1부-세무설계",q:"상속재산 30억, 배우자 상속분 8억일 때 배우자 공제액은?",o:["5억","8억","10억","15억","30억"],a:1,s:"배우자 실제 상속분 8억→8억 공제(최소5억, 최대30억 범위 내)"},
{c:"1부-세무설계",q:"현재 5세 장애인의 상속세 미성년자 공제+장애인 공제 합계는?(기대여명 70년)",o:["1.4억","7억","7.14억","8.4억","8.54억"],a:3,s:"미성년자 공제=1천만원×(19-5)=1.4억원, 장애인 공제=1천만원×70년=7억원, 합계=8.4억원"},
{c:"1부-보험은퇴",q:"국민연금 보험료 계산: 기준소득월액 300만원, 사업장가입자일 때 본인 부담액은?",o:["12만원","13.5만원","15만원","18만원","27만원"],a:1,s:"본인: 300만×4.5%=13.5만원"},
{c:"1부-보험은퇴",q:"기초연금 소득평가액: 근로소득 300만원, 기타소득 30만원일 때?",o:["131.6만원","141.6만원","151.6만원","161.6만원","171.6만원"],a:3,s:"소득평가액=0.7×(300-112)+30=0.7×188+30=131.6+30=161.6만원"},
{c:"1부-보험은퇴",q:"보험금 2억, 총보험료 8천만원 중 배우자가 6천만원 납부 시 증여재산가액은?",o:["1억","1.2억","1.5억","1.6억","2억"],a:2,s:"2억×(6천만/8천만)=2억×0.75=1.5억"},
{c:"1부-보험은퇴",q:"산재보험 장의비: 평균임금 10만원일 때 장의비는?",o:["600만원","900만원","1,000만원","1,200만원","1,500만원"],a:3,s:"장의비=평균임금×120일=10만×120=1,200만원"},
{c:"1부-보험은퇴",q:"산재 휴업급여: 평균임금 10만원, 30일 취업불능 시 휴업급여 총액은?",o:["150만원","180만원","200만원","210만원","250만원"],a:3,s:"10만×70%×30일=7만×30=210만원"},
// 1부 계산문제 추가 보충 (20% 달성용)
{c:"1부-재산관리",q:"65세 이상 1,200만명, 15~64세 3,600만명일 때 노령화지수는?(소수점 반올림)",o:["25","28","30","33","36"],a:3,s:"노령화지수=1200/3600×100=33.3≒33"},
{c:"1부-거시경제",q:"노동가능인구 4,000만, 비경제활동인구 1,400만일 때 경제활동인구는?",o:["2,000만","2,200만","2,400만","2,600만","2,800만"],a:3,s:"경제활동인구=노동가능인구-비경제활동인구=4000-1400=2600만"},
{c:"1부-환율경기",q:"현금비율 0.15, 지급준비율 0.05일 때 통화승수는?",o:["4.25","5.00","5.75","6.00","6.50"],a:2,s:"(1+0.15)/(0.15+0.05)=1.15/0.2=5.75"},
{c:"1부-환율경기",q:"BSI 계산: 긍정 200개, 부정 100개, 전체 500개일 때 BSI는?",o:["105","110","115","120","125"],a:3,s:"((200-100)/500)×100+100=(100/500)×100+100=20+100=120"},
{c:"1부-세무설계",q:"배우자 공제액 계산: 상속재산 총 50억, 배우자 법정상속분 20억 실제상속 시 공제액은?",o:["5억","10억","15억","20억","30억"],a:3,s:"배우자 실제 상속분 20억→20억 공제(최소5억~최대30억 범위)"},
{c:"1부-세무설계",q:"현재 10세 미성년자의 상속세 미성년자 공제액은?",o:["5천만원","7천만원","9천만원","1억원","1.2억원"],a:2,s:"1천만원×(19-10)=9천만원"},
{c:"1부-세무설계",q:"증여세 계산: 부모가 성년 자녀에게 1억 증여, 10년 내 첫 증여 시 과세표준은?",o:["3천만원","4천만원","5천만원","6천만원","1억원"],a:2,s:"과세표준=1억-5천만원(직계존속→성년자 공제)=5천만원"},
{c:"1부-세무설계",q:"양도가 12억, 취득가 7억, 필요경비 5천만원일 때 양도차익은?",o:["3.5억","4.0억","4.5억","5.0억","5.5억"],a:2,s:"12억-7억-0.5억=4.5억"},
{c:"1부-세무설계",q:"양도차익 3억, 보유 10년·거주 10년인 1세대1주택의 양도소득금액은?",o:["3천만원","4천만원","5천만원","6천만원","9천만원"],a:3,s:"공제: 보유10년×4%=40%+거주10년×4%=40%=80%. 양도소득=3억×20%=6천만원"},
{c:"1부-세무설계",q:"양도가 20억 고가주택, 양도차익 8억일 때 과세대상 양도차익은?",o:["2.4억","2.8억","3.2억","3.6억","4.0억"],a:2,s:"8억×(20억-12억)/20억=8억×8/20=3.2억"},
{c:"1부-세무설계",q:"금융소득: 이자 1,500만원, Gross-up 대상 배당 1,000만원일 때 종합과세 기준초과 Gross-up 금액은?",o:["25만원","50만원","75만원","100만원","150만원"],a:1,s:"총금융소득=2500만. 2000만 초과분=500만. 이자1500만 먼저 합산→잔여500만이 배당에서. 500만×10%=50만원"},
{c:"1부-보험은퇴",q:"국민연금: 기준소득월액 400만원, 지역가입자일 때 월 보험료는?",o:["18만원","27만원","32만원","36만원","40만원"],a:3,s:"지역가입자: 400만×9%=36만원"},
{c:"1부-보험은퇴",q:"장애인(기대여명 50년)의 상속세 장애인 공제액은?",o:["1억원","3억원","5억원","7억원","10억원"],a:2,s:"1천만원×50년=5억원"},
{c:"1부-보험은퇴",q:"DB형 퇴직급여: 퇴직 전 3개월 평균임금 400만원, 근속 20년일 때 퇴직금은?",o:["4천만원","6천만원","8천만원","1억원","1.2억원"],a:2,s:"퇴직금=평균임금×근속연수=400만×20=8천만원(DB는 확정급여)"},

{c:"2부-금융상품",q:"ISA 연간납입한도 2천만원, 가입 후 2년 경과, 누적납입 3천만원일 때 남은 납입가능액은?",o:["1천만원","2천만원","3천만원","4천만원","5천만원"],a:2,s:"연간한도: 2천만×(1+2)-3천만=6천만-3천만=3천만원. (Max 4년이므로 2년은 해당없음)"},
{c:"2부-집합투자",q:"집합투자재산 연평균가액 100억, 판매보수율 0.5%일 때 연간 판매보수는?",o:["3천만원","4천만원","5천만원","6천만원","1억원"],a:2,s:"100억×0.5%=5천만원"},
{c:"2부-집합투자",q:"펀드 매입금액 1억, 판매수수료율 1.5%일 때 판매수수료는?",o:["100만원","120만원","150만원","200만원","250만원"],a:2,s:"1억×1.5%=150만원"},
{c:"2부-주식투자",q:"당기순이익 200억, 총자산 2,000억일 때 ROA는?",o:["5%","8%","10%","12%","15%"],a:2,s:"ROA=200/2000×100=10%"},
{c:"2부-주식투자",q:"매출액 500억, 전기매출액 400억일 때 매출액증가율은?",o:["15%","20%","25%","30%","35%"],a:2,s:"매출액증가율=(500/400-1)×100=25%"},
{c:"2부-주식투자",q:"영업이익 50억, 이자비용 10억일 때 이자보상비율은?",o:["200%","300%","400%","500%","600%"],a:3,s:"이자보상비율=50/10×100=500%"},
{c:"2부-주식투자",q:"유동자산 300억, 유동부채 200억일 때 유동비율은?",o:["100%","120%","140%","150%","200%"],a:3,s:"유동비율=300/200×100=150%"},
{c:"2부-주식투자",q:"주가 50,000원, 주당현금흐름 5,000원일 때 PCR은?",o:["5배","8배","10배","12배","15배"],a:2,s:"PCR=50000/5000=10배"},
{c:"2부-주식투자",q:"배당금 1,000원, 액면가 5,000원일 때 배당률은?",o:["10%","15%","20%","25%","30%"],a:2,s:"배당률=1000/5000×100=20%"},
{c:"2부-주식투자",q:"배당금 총액 100억, 당기순이익 500억일 때 배당지급률은?",o:["10%","15%","20%","25%","30%"],a:2,s:"배당지급률=100/500×100=20%"},
{c:"2부-주식투자",q:"포트폴리오 수익률 18%, 무위험 3%, 베타 1.5, 시장수익률 13%일 때 젠센알파는?",o:["0%","1%","2%","3%","5%"],a:0,s:"알파=(18-3)-1.5×(13-3)=15-15=0%. 시장수준과 동일한 성과"},
{c:"2부-채권투자",q:"액면 10,000원, 발행이율 4%, 3년만기 할인채 발행가격은?(소수점 반올림)",o:["8,560원","8,700원","8,890원","9,000원","9,260원"],a:2,s:"10000/(1.04)³=10000/1.1249≒8,890원"},
{c:"2부-채권투자",q:"매입금리 6%, 매도금리 4%, 잔존듀레이션 4년, 투자기간 2년일 때 자본손익률은?",o:["2%","3%","4%","5%","6%"],a:2,s:"(6%-4%)×4/2=8%/2=4%"},
{c:"2부-채권투자",q:"수정듀레이션 5, 금리 0.5% 하락 시 채권가격 변동률은?(컨벡시티 무시)",o:["2.0% 상승","2.5% 상승","3.0% 상승","3.5% 상승","5.0% 상승"],a:1,s:"변동률=-5×(-0.005)=+0.025=+2.5% 상승"},
{c:"2부-파생상품",q:"포트폴리오 200억, 현재 베타 1.2, 목표베타 0(완전헤지), 선물1계약 2억일 때 매도 계약수는?",o:["60","80","100","120","150"],a:3,s:"N=(0-1.2)×200억/2억=-120→120계약 매도"},
{c:"2부-투자설계",q:"A자산 투자비중 60%(수익률 8%), B자산 40%(수익률 12%)일 때 가중평균수익률은?",o:["8.8%","9.2%","9.6%","10.0%","10.4%"],a:2,s:"0.6×8+0.4×12=4.8+4.8=9.6%"},
{c:"2부-투자설계",q:"무위험수익률 3%, 시장수익률 10%, 시장표준편차 14%일 때 CML의 위험보상비율은?",o:["0.25","0.40","0.50","0.60","0.75"],a:2,s:"(10-3)/14=7/14=0.50"},
{c:"2부-투자설계",q:"무위험 4%, 시장수익률 12%, 베타 0.8인 주식의 CAPM 기대수익률은?",o:["8.0%","9.2%","10.4%","11.6%","12.0%"],a:2,s:"4+0.8×(12-4)=4+6.4=10.4%"},
{c:"2부-부동산",q:"대지면적 1,000㎡, 건축면적 600㎡, 연면적 3,000㎡일 때 건폐율과 용적률은?",o:["60%, 300%","60%, 500%","30%, 300%","50%, 250%","40%, 200%"],a:0,s:"건폐율=600/1000=60%. 용적률=3000/1000=300%"},

{c:"1부-재산관리",q:"65세 이상 인구가 1,200만명, 15~64세 인구가 3,600만명, 0~14세 인구가 600만명일 때 노령화지수는 약 얼마인가?",o:["약 33.3","약 22.2","약 25.0","약 30.0","약 28.6"],a:0,s:"노령화지수=(1200/3600)×100=33.3. 0~14세 인구는 계산에 사용하지 않는다",d:2},
{c:"1부-재산관리",q:"재무상담과 재무설계의 시작점에 대한 설명으로 옳은 것은?",o:["재무상담은 금융제품 평가에서, 재무설계는 목표에서 시작","둘 다 목표 설정에서 시작","재무상담은 목표에서, 재무설계는 금융제품 평가에서 시작","둘 다 금융제품 평가에서 시작","재무상담은 정보수집에서, 재무설계는 분석평가에서 시작"],a:0,s:"재무상담은 금제평가에서 시작하고, 재무설계는 목표부터 시작한다",d:2},
{c:"1부-재산관리",q:"유망고객의 4가지 조건에 해당하지 않는 것은?",o:["높은 학력 수준","재무목표 보유","경제적 능력","만남 가능성","친화력"],a:0,s:"유망고객 4조건: 재무목표, 경제적 능력, 만남 가능, 친화력. 학력은 포함되지 않는다",d:2},
{c:"1부-재산관리",q:"생애주기 중 자녀 교육비 지출이 가장 크고 소득이 정점에 달하는 시기는?",o:["자녀성장기","자녀양육기","가족형성기","가족축소기","청년기"],a:0,s:"자녀성장기는 자녀 교육비가 최대이며 소득이 정점에 이르는 시기이다",d:2},

// ===== 오답노트(localStorage) =====
function getNB(){try{return JSON.parse(localStorage.getItem('fp_nb')||'[]')}catch(e){return[]}}
function saveNB(n){localStorage.setItem('fp_nb',JSON.stringify(n))}
function addNB(q,ua){const n=getNB(),k=q.q,e=n.find(x=>x.q===k);if(e){e.cnt++;e.d=new Date().toLocaleDateString('ko-KR');e.ua=ua}else{n.push({...q,ua,cnt:1,d:new Date().toLocaleDateString('ko-KR')})}saveNB(n);updBadge()}
function delNB(q){saveNB(getNB().filter(x=>x.q!==q));updBadge();renderNB()}
function clearNotebook(){if(!confirm('오답노트를 모두 지울까요?'))return;localStorage.removeItem('fp_nb');updBadge();renderNB()}
function updBadge(){document.getElementById('noteBadge').textContent=getNB().length}

// ===== 탭 =====
function switchTab(t){document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',t==='quiz'?i===0:i===1));document.getElementById('quizTab').classList.toggle('hidden',t!=='quiz');document.getElementById('notebookTab').classList.toggle('hidden',t!=='notebook');if(t==='notebook')renderNB()}

// ===== 오답노트 렌더 =====
let nf='전체';
function renderNB(){const nb=getNB(),ct=document.getElementById('noteContent'),st=document.getElementById('noteStats'),fw=document.getElementById('noteFilterWrap'),ac=document.getElementById('noteActions');document.getElementById('noteCountText').textContent=`총 ${nb.length}문제`;if(!nb.length){st.innerHTML='';fw.innerHTML='';ct.innerHTML='<div class="note-empty"><div class="big-emoji">🎀</div><p>아직 틀린 문제가 없어요!</p><p style="font-size:.82rem;margin-top:8px">퀴즈를 풀면 틀린 문제가 여기에 쌓여요</p></div>';ac.classList.add('hidden');return}ac.classList.remove('hidden');const cats={};nb.forEach(n=>{cats[n.c]=(cats[n.c]||0)+1});const tw=nb.reduce((s,n)=>s+n.cnt,0);st.innerHTML=`<div class="stat-card"><div class="stat-num">${nb.length}</div><div class="stat-label">틀린 문제</div></div><div class="stat-card"><div class="stat-num">${tw}</div><div class="stat-label">총 오답 횟수</div></div><div class="stat-card"><div class="stat-num">${Object.keys(cats).length}</div><div class="stat-label">카테고리</div></div>`;const ac2=['전체',...Object.keys(cats).sort()];fw.innerHTML='';ac2.forEach(c=>{const b=document.createElement('button');b.className='note-filter-btn'+(nf===c?' active':'');b.textContent=c==='전체'?`전체(${nb.length})`:`${c}(${cats[c]})`;b.onclick=()=>{nf=c;renderNB()};fw.appendChild(b)});const fl=nf==='전체'?nb:nb.filter(n=>n.c===nf);const nm=['①','②','③','④','⑤'];ct.innerHTML='';document.getElementById('wrongQuizBtn').textContent=`❌ 틀린 문제만 다시 풀기 (${fl.length}문제)`;fl.forEach(w=>{const pr=mkPrompt(w);const d=document.createElement('div');d.className='wrong-item';d.innerHTML=`<div class="wrong-count">🔴 ${w.cnt}회 틀림 · ${w.d}<button class="del-btn" onclick="delNB(\`${w.q.replace(/`/g,'')}\`)">삭제</button></div><div class="q-label">[${w.c}]${w.d===2?' <span class="new-badge">NEW</span>':''}</div><div class="q-body">${w.q}</div><div class="answer-info">내 답: ${nm[w.ua]} ${w.o[w.ua]} → 정답: <strong>${nm[w.a]} ${w.o[w.a]}</strong></div><div class="prompt-text" style="font-size:.72rem;max-height:100px">${pr}</div><button class="copy-btn" onclick="copyT(this)">📋 프롬프트 복사</button>`;ct.appendChild(d)})}

function mkPrompt(w){const nm=['①','②','③','④','⑤'];return`아래는 FP(재무설계사) 시험 요점정리 내용입니다:\n\n---\n${w.s}\n---\n\n위 내용을 기반으로, 아래 문제에 대해 해설해주세요:\n\n문제: ${w.q}\n${w.o.map((o,i)=>`${nm[i]} ${o}`).join('\n')}\n\n정답: ${nm[w.a]} ${w.o[w.a]}\n내가 선택한 답: ${nm[w.ua]} ${w.o[w.ua]}\n\n왜 내 답이 틀렸는지, 정답이 맞는 이유를 요점정리 내용 기반으로 상세히 설명해주세요.`}

function mkPromptCorrect(w){const nm=['①','②','③','④','⑤'];return`아래는 FP(재무설계사) 시험 요점정리 내용입니다:\n\n---\n${w.s}\n---\n\n위 내용을 기반으로, 아래 문제에 대해 해설해주세요:\n\n문제: ${w.q}\n${w.o.map((o,i)=>`${nm[i]} ${o}`).join('\n')}\n\n정답: ${nm[w.a]} ${w.o[w.a]}\n\n정답인 이유와 나머지 선택지가 왜 틀린지 요점정리 내용 기반으로 상세히 설명해주세요.`}

// ===== 퀴즈 로직 =====
let selCats=new Set(),selDiff='전체',cQuiz=[],cIdx=0,score=0,wrongs=[],answered=false,qTotal=10;
const cats=[...new Set(Q.map(q=>q.c))].sort();

function init(){const g=document.getElementById('catGrid');['전체','1부','2부'].forEach(k=>{const b=document.createElement('button');b.className='cat-btn'+(k==='전체'?' active':'');b.textContent=k==='전체'?'전체':k+' 전체';b.dataset.f=k;b.onclick=()=>togF(b,k);g.appendChild(b)});cats.forEach(c=>{const b=document.createElement('button');b.className='cat-btn';b.textContent=c;b.dataset.c=c;b.onclick=()=>togC(b,c);g.appendChild(b)});/* 난이도 필터 */const dg=document.getElementById('diffGrid');['전체','기존','NEW'].forEach(k=>{const b=document.createElement('button');b.className='cat-btn'+(k==='전체'?' active':'');b.textContent=k==='전체'?'전체 난이도':k==='NEW'?'🆕 NEW':k;b.dataset.d=k;b.onclick=()=>{dg.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');selDiff=k;updCnt()};dg.appendChild(b)});selCats=new Set(['전체']);updCnt();updBadge()}

function togF(b,f){document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');selCats.clear();selCats.add(f);updCnt()}
function togC(b,c){document.querySelectorAll('.cat-btn').forEach(x=>{if(x.dataset.f)x.classList.remove('active')});b.classList.toggle('active');if(selCats.has('전체')||selCats.has('1부')||selCats.has('2부'))selCats.clear();if(selCats.has(c))selCats.delete(c);else selCats.add(c);if(!selCats.size){selCats.add('전체');document.querySelector('[data-f="전체"]').classList.add('active')}updCnt()}

function getFQ(){let pool;if(selCats.has('전체'))pool=[...Q];else if(selCats.has('1부'))pool=Q.filter(q=>q.c.startsWith('1부'));else if(selCats.has('2부'))pool=Q.filter(q=>q.c.startsWith('2부'));else pool=Q.filter(q=>selCats.has(q.c));if(selDiff==='기존')return pool.filter(q=>!q.d||q.d===1);if(selDiff==='NEW')return pool.filter(q=>q.d===2);return pool}
function updCnt(){const f=getFQ();const nw=f.filter(q=>q.d===2).length;const extra=nw>0?` (NEW ${nw}문제 포함)`:'';document.getElementById('countInfo').textContent=`총 ${f.length}문제 중 랜덤 ${Math.min(10,f.length)}문제 출제${extra}`}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function startQuiz(mode){let pool;if(mode==='wrong'){const nb=getNB();pool=(nf==='전체'?nb:nb.filter(n=>n.c===nf)).map(n=>Q.find(q=>q.q===n.q)||n);if(!pool.length){alert('틀린 문제가 없어요!');return}}else{pool=getFQ()}qTotal=Math.min(10,pool.length);if(pool.length<1){alert('문제가 없습니다.');return}cQuiz=shuf(pool).slice(0,qTotal);cIdx=0;score=0;wrongs=[];answered=false;switchTab('quiz');document.getElementById('startScreen').classList.add('hidden');document.getElementById('resultScreen').classList.add('hidden');document.getElementById('quizScreen').classList.remove('hidden');renderQ()}

function renderQ(){answered=false;const q=cQuiz[cIdx];document.getElementById('progressText').textContent=`${cIdx+1} / ${qTotal}`;document.getElementById('progressBar').style.width=((cIdx+1)/qTotal*100)+'%';document.getElementById('qNum').textContent=cIdx+1;document.getElementById('qText').innerHTML=`<strong>[${q.c}]</strong>${q.d===2?' <span class="new-badge">NEW</span>':''} ${q.q}`;const w=document.getElementById('optionsWrap');w.innerHTML='';const nm=['①','②','③','④','⑤'];q.o.forEach((opt,i)=>{const b=document.createElement('button');b.className='option-btn';b.innerHTML=`<span class="option-num">${nm[i]}</span>${opt}`;b.onclick=()=>selAns(i);w.appendChild(b)});document.getElementById('promptBox').style.display='none';document.getElementById('nextBtn').style.display='none'}

function selAns(idx){if(answered)return;answered=true;const q=cQuiz[cIdx],bs=document.querySelectorAll('.option-btn'),nm=['①','②','③','④','⑤'];bs.forEach(b=>b.classList.add('disabled'));if(idx===q.a){bs[idx].classList.add('correct');score++;const pr=mkPromptCorrect({...q,ua:idx});document.getElementById('promptText').textContent=pr;document.getElementById('promptBox').style.display='block'}else{bs[idx].classList.add('wrong');bs[q.a].classList.add('show-answer');wrongs.push({...q,ua:idx});addNB(q,idx);const pr=mkPrompt({...q,ua:idx});document.getElementById('promptText').textContent=pr;document.getElementById('promptBox').style.display='block'}const nb=document.getElementById('nextBtn');nb.style.display='block';nb.textContent=cIdx<qTotal-1?'다음 문제 →':'결과 보기 ✨'}

function nextQuestion(){cIdx++;if(cIdx>=qTotal)showResult();else renderQ()}

function showResult(){document.getElementById('quizScreen').classList.add('hidden');document.getElementById('resultScreen').classList.remove('hidden');document.getElementById('resultScore').textContent=`${score}/${qTotal}`;const p=score/qTotal;let e,m;if(p===1){e='🎉🥳';m='완벽해요! 만점이에요!'}else if(p>=.8){e='✨💖';m='대단해요! 거의 다 맞혔어요!'}else if(p>=.6){e='💪😊';m='잘하고 있어요! 조금만 더!'}else if(p>=.4){e='📖💜';m='괜찮아요! 복습하면 금방 올라가요!'}else{e='🌱💕';m='시작이 반! 차근차근 해봐요!'}document.getElementById('resultEmoji').textContent=e;document.getElementById('resultMsg').textContent=m;updBadge();const l=document.getElementById('wrongList');l.innerHTML='';if(!wrongs.length){l.innerHTML='<p style="text-align:center;color:#81c784;font-weight:500">틀린 문제가 없어요! 🎊</p>';return}l.innerHTML='<div style="font-weight:600;color:#e57373;margin-bottom:14px">📝 이번에 틀린 문제</div>';const nm=['①','②','③','④','⑤'];wrongs.forEach(w=>{const pr=mkPrompt(w),d=document.createElement('div');d.className='wrong-item';d.innerHTML=`<div class="q-label">[${w.c}]</div><div class="q-body">${w.q}</div><div class="answer-info">내 답: ${nm[w.ua]} ${w.o[w.ua]} → 정답: <strong>${nm[w.a]} ${w.o[w.a]}</strong></div><div class="prompt-text" style="font-size:.72rem;max-height:100px">${pr}</div><button class="copy-btn" onclick="copyT(this)">📋 프롬프트 복사</button>`;l.appendChild(d)})}

function copyPrompt(){const t=document.getElementById('promptText').textContent;navigator.clipboard.writeText(t).then(()=>{const b=document.querySelector('#promptBox .copy-btn');b.textContent='✅ 복사 완료!';setTimeout(()=>b.textContent='📋 프롬프트 복사하기',2e3)})}
function copyT(b){const t=b.previousElementSibling.textContent;navigator.clipboard.writeText(t).then(()=>{b.textContent='✅ 복사 완료!';setTimeout(()=>b.textContent='📋 프롬프트 복사',2e3)})}

let letterOpen=false;
function toggleLetter(){if(letterOpen){closeLetter();return}const m=LETTERS[Math.floor(Math.random()*LETTERS.length)];document.getElementById('letterGreeting').textContent=m.g;document.getElementById('letterBody').textContent=m.b;document.getElementById('letterFrom').textContent=m.f;document.getElementById('letterBubble').style.display='block';document.getElementById('letterBadge').style.display='none';letterOpen=true}
function closeLetter(){document.getElementById('letterBubble').style.display='none';letterOpen=false}

// ===== 화면보호기 =====
let ssActive=false,ssSetupOpen=false;
let ssSetupShown=false;
function initSS(){
const img=localStorage.getItem('fp_ss_img');
const fit=localStorage.getItem('fp_ss_fit')||'contain';
if(img){document.getElementById('ssImg').src=img;renderSSPreview(img);document.getElementById('ssRemoveBtn').style.display='block';ssSetupShown=true}
if(localStorage.getItem('fp_ss_setup_done'))ssSetupShown=true;
if(fit==='cover'){document.getElementById('ssOverlay').classList.add('cover');document.getElementById('ssFitCover').classList.add('active');document.getElementById('ssFitContain').classList.remove('active')}
}
function toggleSS(){
if(ssActive){hideSS();return}
if(!ssSetupShown){ssSetupShown=true;localStorage.setItem('fp_ss_setup_done','1');if(ssSetupOpen){closeSSSetup()}else{openSSSetup()};return}
showSS();
}
function showSS(){
ssActive=true;
const ov=document.getElementById('ssOverlay');
const img=localStorage.getItem('fp_ss_img');
if(img){ov.style.background='#000';document.getElementById('ssImg').style.display='block';document.getElementById('ssImg').src=img}
else{ov.style.background='rgba(0,0,0,0.95)';document.getElementById('ssImg').style.display='none'}
ov.style.display='block';
document.getElementById('ssWrap').style.display='none';
closeSSSetup();
}
function hideSS(){
ssActive=false;
document.getElementById('ssOverlay').style.display='none';
document.getElementById('ssWrap').style.display='flex';
}
function openSSSetup(){ssSetupOpen=true;document.getElementById('ssSetup').style.display='block'}
function closeSSSetup(){ssSetupOpen=false;document.getElementById('ssSetup').style.display='none'}
function handleSSUpload(e){
const file=e.target.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=function(ev){
const data=ev.target.result;
try{localStorage.setItem('fp_ss_img',data)}catch(err){alert('이미지가 너무 큽니다. 더 작은 이미지를 사용해주세요.');return}
document.getElementById('ssImg').src=data;
renderSSPreview(data);
document.getElementById('ssRemoveBtn').style.display='block';
document.getElementById('ssUploadArea').innerHTML='<div style="font-size:1.5rem">✅</div><p>이미지가 등록되었어요!</p><p style="font-size:.7rem;color:#81c784">버튼을 누르면 바로 전환됩니다</p>';
};
reader.readAsDataURL(file);
}
function renderSSPreview(data){
const w=document.getElementById('ssPreviewWrap');
w.innerHTML=`<img class="ss-preview" src="${data}" alt="미리보기">`;
}
function setSSFit(mode){
localStorage.setItem('fp_ss_fit',mode);
const ov=document.getElementById('ssOverlay');
if(mode==='cover'){ov.classList.add('cover')}else{ov.classList.remove('cover')}
document.getElementById('ssFitContain').classList.toggle('active',mode==='contain');
document.getElementById('ssFitCover').classList.toggle('active',mode==='cover');
}
function removeSSImage(){
localStorage.removeItem('fp_ss_img');
document.getElementById('ssImg').src='';
document.getElementById('ssPreviewWrap').innerHTML='';
document.getElementById('ssRemoveBtn').style.display='none';
document.getElementById('ssUploadArea').innerHTML='<div style="font-size:1.5rem">📷</div><p>이미지를 선택하세요</p><p style="font-size:.7rem;color:#ce93d8">(캡쳐 화면, 다른 앱 화면 등)</p>';
}
// Ctrl+Shift+Z 단축키
document.addEventListener('keydown',function(e){
if(e.ctrlKey&&e.shiftKey&&(e.key==='z'||e.key==='Z')){
e.preventDefault();
if(ssActive){hideSS()}else{toggleSS()}
}
if(ssActive&&e.key==='Escape')hideSS();
});
initSS();
</script>
