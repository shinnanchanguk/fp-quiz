<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0e6ff"/>
      <stop offset="50%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b388ff"/>
      <stop offset="100%" style="stop-color:#ea80fc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Plate -->
  <ellipse cx="90" cy="128" rx="55" ry="14" fill="url(#plate)" opacity="0.3"/>
  <!-- Bottom rice cake (white) -->
  <rect x="48" y="88" width="84" height="32" rx="16" fill="#fff" stroke="#e1bee7" stroke-width="1.5"/>
  <!-- Middle rice cake (pink) -->
  <rect x="55" y="60" width="70" height="30" rx="15" fill="#f8bbd0" stroke="#f48fb1" stroke-width="1"/>
  <!-- Top rice cake (green) -->
  <rect x="62" y="34" width="56" height="28" rx="14" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="1"/>
  <!-- Sparkles -->
  <text x="30" y="45" font-size="16">✨</text>
  <text x="135" y="65" font-size="14">✨</text>
  <text x="25" y="110" font-size="12">🌸</text>
  <text x="145" y="100" font-size="12">🌸</text>
  <!-- 合格 text -->
  <text x="90" y="155" text-anchor="middle" font-size="18" font-weight="bold" fill="#7c4dff" font-family="sans-serif">합격기원</text>
</svg>
